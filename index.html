<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventario - Inicio</title>
<link rel="stylesheet" href="Styles/Style.css"> 
</head>
<body>
  <header>
    <h1>Inventario - Panel de inicio</h1>
    <p>
      Controla tu stock con rapidez: agrega productos, revisa niveles y genera
      reportes desde una sola pantalla.
    </p>
  </header>

  <main class="container">
    <section class="card">
      <div class="search-box">
        <input
          id="searchInput"
          type="search"
          placeholder="Buscar producto, categoría o código..."
          aria-label="Buscar inventario"
        />
      </div>

      <div class="actions">
        <button class="btn primary" id="btnAdd">Agregar producto</button>
        <button class="btn secondary" id="btnEgress">Egresar producto</button>
        <button class="btn secondary" id="btnList">Ver inventario</button>
        <button class="btn secondary" id="btnReport">Generar reporte</button>
      </div>
    </section>

    <section class="stats">
      <div class="stat">
        <small>Total de productos</small>
        <span id="statTotal">--</span>
      </div>
      <div class="stat">
        <small>Productos bajo mínimo</small>
        <span id="statLowStock">--</span>
      </div>
      <div class="stat">
        <small>Última actualización</small>
        <span id="statUpdated">--</span>
      </div>
    </section>
  </main>

  <script>
    // Cargar productos desde localStorage
    function loadProducts() {
      const products = JSON.parse(localStorage.getItem('products')) || [];
      return products;
    }

    // Calcular estadísticas
    function updateStats() {
      const products = loadProducts();
      const total = products.length;
      const lowStock = products.filter(p => p.quantity <= p.minStock).length;
      const updated = new Date().toLocaleString();

      document.getElementById("statTotal").textContent = total;
      document.getElementById("statLowStock").textContent = lowStock;
      document.getElementById("statUpdated").textContent = updated;
    }

    // Inicializar
    updateStats();

    // Navegar a páginas
    document.getElementById("btnAdd").onclick = () => {
      window.location.href = 'agregar-producto.html';
    };
    document.getElementById("btnEgress").onclick = () => {
      window.location.href = 'egreso-producto.html';
    };
    document.getElementById("btnList").onclick = () => {
      window.location.href = 'ver-inventario.html';
    };
    document.getElementById("btnReport").onclick = () => {
      window.location.href = 'generar-reporte.html';
    };
  </script>
</body>
</html>
